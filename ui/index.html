<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaultic</title>
    <!-- Immediate dark theme before React/CSS loads — prevents white flash and invisible text on mobile -->
    <style>html, body { background: #0f1117; color: #e8eaf0; }</style>
    <!-- Catch JS errors and show them on screen — useful for mobile debugging where DevTools isn't available -->
    <script>
      function showError(msg) {
        document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0f1117;color:#e8eaf0;padding:24px;font-size:13px;overflow:auto;z-index:9999">'
          + '<div style="color:#f87171;font-weight:700;font-size:16px;margin-bottom:12px">Error</div>'
          + '<pre style="white-space:pre-wrap;word-break:break-all">' + msg + '</pre>'
          + '</div>';
      }
      window.onerror = function(msg, src, line, col, err) {
        showError((err && err.stack) || msg);
        return true;
      };
      window.addEventListener('unhandledrejection', function(e) {
        showError(e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      });
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- PWA manifest — enables "Add to Home Screen" on iOS/Android -->
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS PWA meta tags (Safari ignores the manifest for some properties) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vaultic" />
    <!-- Theme color for browser chrome on Android -->
    <meta name="theme-color" content="#6366f1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
