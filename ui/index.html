<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaultic</title>
    <!-- Immediate dark background before React/CSS loads — prevents white flash on mobile -->
    <style>html, body { background: #0f1117; }</style>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- PWA manifest — enables "Add to Home Screen" on iOS/Android -->
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS PWA meta tags (Safari ignores the manifest for some properties) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vaultic" />
    <!-- Theme color for browser chrome on Android -->
    <meta name="theme-color" content="#6366f1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
