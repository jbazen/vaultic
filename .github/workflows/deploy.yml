name: Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Run backend unit tests ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  # ── 1b. Run Playwright E2E tests ──────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=list

  # ── 2. Deploy to Oracle Cloud (only if tests pass) ───────────────────────────
  deploy:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: success()

    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/vaultic

            # Save current commit for rollback
            OLD_COMMIT=$(git rev-parse HEAD)

            # Install Litestream if not present (idempotent)
            if ! command -v litestream &> /dev/null; then
              echo "Installing Litestream..."
              curl -fsSL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz \
                | tar -xz -C /tmp
              sudo mv /tmp/litestream /usr/local/bin/litestream
              echo "Litestream installed: $(litestream version)"
            fi

            # Configure journald log rotation (idempotent) — caps journal at 500MB
            if ! grep -q "^SystemMaxUse=500M" /etc/systemd/journald.conf; then
              sudo sed -i 's/^#\?SystemMaxUse=.*/SystemMaxUse=500M/' /etc/systemd/journald.conf
              sudo systemctl restart systemd-journald
              echo "journald log rotation configured (500MB cap)"
            fi

            # Ensure we're on main branch (rollback may have left detached HEAD)
            git checkout main 2>/dev/null || true
            # Clean untracked scripts that may conflict with incoming tracked files
            git clean -f scripts/ 2>/dev/null || true
            # Pull latest code (repo is public, HTTPS works without a deploy key)
            git pull https://github.com/jbazen/vaultic.git main

            # Python deps — install into the project venv (matches systemd ExecStart path)
            .venv/bin/pip install -q -r requirements.txt

            # Build frontend (output lands in ui/dist/, served by nginx)
            cd ui
            npm ci --silent
            npm run build
            cd ..

            # Update systemd service file (picks up Litestream ExecStart changes)
            sudo cp deploy/vaultic-api.service /etc/systemd/system/vaultic-api.service
            sudo systemctl daemon-reload

            # Restart API (Litestream wraps uvicorn — both restart together)
            sudo systemctl restart vaultic-api.service

            # Update nginx config and reload (picks up cache-control header changes)
            sudo cp deploy/vaultic-nginx.conf /etc/nginx/sites-available/vaultic
            sudo nginx -t && sudo systemctl reload nginx

            # Health check — retry up to 5 times with 3s intervals (Litestream + uvicorn startup)
            HEALTHY=0
            for i in 1 2 3 4 5; do
              sleep 3
              if curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Health check failed after 5 attempts!"
              echo "--- Last 40 lines of service log ---"
              sudo journalctl -u vaultic-api.service -n 40 --no-pager || true
              echo "--- Service status ---"
              sudo systemctl status vaultic-api.service --no-pager || true
              echo "Rolling back to $OLD_COMMIT"
              git checkout "$OLD_COMMIT"
              .venv/bin/pip install -q -r requirements.txt
              cd ui && npm ci --silent && npm run build && cd ..
              sudo systemctl restart vaultic-api.service
              exit 1
            fi

            # Force-refresh net worth snapshot (applies calculation fixes immediately)
            .venv/bin/python scripts/refresh_nw_snapshot.py || true

            # Diagnostics
            .venv/bin/python scripts/nw_calc_debug.py || true

            echo "Deploy complete"
