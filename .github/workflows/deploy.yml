name: Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Run backend unit tests ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  # ── 2. Deploy to Oracle Cloud (only if tests pass) ───────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: success()

    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/vaultic

            # Save current commit for rollback
            OLD_COMMIT=$(git rev-parse HEAD)

            # Install Litestream if not present (idempotent)
            if ! command -v litestream &> /dev/null; then
              echo "Installing Litestream..."
              curl -fsSL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz \
                | tar -xz -C /tmp
              sudo mv /tmp/litestream /usr/local/bin/litestream
              echo "Litestream installed: $(litestream version)"
            fi

            # Pull latest code (repo is public, HTTPS works without a deploy key)
            git pull https://github.com/jbazen/vaultic.git main

            # Python deps — install into the project venv (matches systemd ExecStart path)
            .venv/bin/pip install -q -r requirements.txt

            # Build frontend (output lands in ui/dist/, served by nginx)
            cd ui
            npm ci --silent
            npm run build
            cd ..

            # Update systemd service file (picks up Litestream ExecStart changes)
            sudo cp deploy/vaultic-api.service /etc/systemd/system/vaultic-api.service
            sudo systemctl daemon-reload

            # Restart API (Litestream wraps uvicorn — both restart together)
            sudo systemctl restart vaultic-api.service

            # Update nginx config and reload (picks up cache-control header changes)
            sudo cp deploy/vaultic-nginx.conf /etc/nginx/sites-available/vaultic
            sudo nginx -t && sudo systemctl reload nginx

            # Health check — verify the app came up
            sleep 3
            if ! curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "Health check failed! Rolling back to $OLD_COMMIT"
              git checkout "$OLD_COMMIT"
              .venv/bin/pip install -q -r requirements.txt
              cd ui && npm ci --silent && npm run build && cd ..
              sudo systemctl restart vaultic-api.service
              exit 1
            fi

            echo "Deploy complete"
