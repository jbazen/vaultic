# nginx site config for vaulticsage.com
# Uses Cloudflare Origin Certificate (Full Strict mode) — NOT certbot.
#
# One-time setup on server:
#   sudo cp deploy/vaultic-nginx.conf /etc/nginx/sites-available/vaultic
#   sudo ln -s /etc/nginx/sites-available/vaultic /etc/nginx/sites-enabled/vaultic
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones — keyed by real client IP (Cloudflare passes it in CF-Connecting-IP)
# login: 5 requests/minute for auth endpoints (brute-force protection)
# api:   30 requests/second for general API endpoints
limit_req_zone $http_cf_connecting_ip zone=login:10m rate=5r/m;
limit_req_zone $http_cf_connecting_ip zone=api:10m rate=30r/s;

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name vaulticsage.com www.vaulticsage.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vaulticsage.com www.vaulticsage.com;

    # Cloudflare Origin Certificate (created in Cloudflare dashboard:
    # SSL/TLS → Origin Server → Create Certificate → paste into these files)
    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Serve the built React app
    root  /home/ubuntu/vaultic/ui/dist;
    index index.html;

    # index.html and service worker must never be cached by the browser or iOS PWA.
    # Vite hashes all JS/CSS filenames on each build, so once iOS fetches a fresh
    # index.html it automatically pulls the new bundles — no reinstall needed.
    location = /index.html {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed JS/CSS/image assets — cache aggressively (filename changes on every build)
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all non-file routes serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow up to 25MB uploads (PDF import; nginx default is 1MB)
    client_max_body_size 25m;

    # Auth endpoints — strict rate limit (5 req/min with small burst)
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/auth/verify-2fa {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # General API endpoints — moderate rate limit
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Gzip compression for API responses and static fallbacks
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
