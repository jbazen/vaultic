# nginx site config for vaulticsage.com
# Uses Cloudflare Origin Certificate (Full Strict mode) — NOT certbot.
#
# One-time setup on server:
#   sudo cp deploy/vaultic-nginx.conf /etc/nginx/sites-available/vaultic
#   sudo ln -s /etc/nginx/sites-available/vaultic /etc/nginx/sites-enabled/vaultic
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name vaulticsage.com www.vaulticsage.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vaulticsage.com www.vaulticsage.com;

    # Cloudflare Origin Certificate (created in Cloudflare dashboard:
    # SSL/TLS → Origin Server → Create Certificate → paste into these files)
    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Serve the built React app
    root  /home/ubuntu/vaultic/ui/dist;
    index index.html;

    # SPA fallback — all non-file routes serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow up to 25MB uploads (PDF import; nginx default is 1MB)
    client_max_body_size 25m;

    # Proxy all /api/ requests to the FastAPI backend running on localhost:8000
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
